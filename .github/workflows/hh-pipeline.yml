name: HH Pipeline

on:
  schedule:
    # 10:17 MSK (UTC+3). Avoid minute :00 — GitHub often delays/drops scheduled runs at the top of the hour.
    - cron: "17 7 * * *"
  workflow_dispatch:

jobs:
  hh-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      HH_AUTH_STATE_B64: ${{ secrets.HH_AUTH_STATE_B64 }}
      HH_AUTH_META_B64: ${{ secrets.HH_AUTH_META_B64 }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      APPLY_DRY_RUN: ${{ secrets.APPLY_DRY_RUN || 'true' }}
      RANK_LIMIT: "100"
      APPLY_MAX_PER_RUN: "30"
      HEADLESS: "true"
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify database connection
        run: npm run db:check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore HH session
        run: npm run hh:auth:restore

      - name: Verify HH session
        run: npm run hh:auth:check

      - name: Scrape vacancies
        run: npm run hh:scrape

      - name: Rank vacancies (DeepSeek)
        run: npm run ai:rank

      - name: Apply to vacancies
        run: npm run hh:apply
